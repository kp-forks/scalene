\* Deadlock-freedom + signal-safety for Scalene's lock/queue topology.
\* N = 3 models the three real sigqueues (alloc, memcpy, async).
\* Expected: no deadlock, all invariants hold, output makes progress.
SPECIFICATION Spec
CONSTANTS
    N = 3
    MaxHandler = 2
INVARIANT TypeOK
INVARIANT MutualExclusion
INVARIANT HandlerNeverBlocks
PROPERTY OutputMakesProgress
CHECK_DEADLOCK TRUE
